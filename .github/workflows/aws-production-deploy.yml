name: AWS Production Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: aws-production-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  DYNAMODB_TABLE_PREFIX: MobileIDProd-
  CLOUDWATCH_LOG_GROUP: /ecs/mobileid-production

jobs:
  backend-deploy:
    name: Backend Deploy (ECS)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          ECS_EXECUTION_ROLE_ARN: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}
          ECS_TASK_ROLE_ARN: ${{ secrets.ECS_TASK_ROLE_ARN }}
          DJANGO_SECRET_KEY_ARN: ${{ secrets.DJANGO_SECRET_KEY_ARN }}
          DJANGO_SUPERUSER_PASSWORD_ARN: ${{ secrets.DJANGO_SUPERUSER_PASSWORD_ARN }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
          ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
          BACKEND_CLOUDFRONT_DOMAIN: ${{ vars.BACKEND_CLOUDFRONT_DOMAIN }}
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          CSRF_TRUSTED_ORIGINS: ${{ vars.CSRF_TRUSTED_ORIGINS }}
          ADMIN_URL_PATH: ${{ vars.ADMIN_URL_PATH }}
          DJANGO_SUPERUSER_USERNAME: ${{ vars.DJANGO_SUPERUSER_USERNAME }}
          DJANGO_SUPERUSER_EMAIL: ${{ vars.DJANGO_SUPERUSER_EMAIL }}
          EFS_FILE_SYSTEM_ID: ${{ vars.EFS_FILE_SYSTEM_ID }}
          EFS_ACCESS_POINT_ID: ${{ vars.EFS_ACCESS_POINT_ID }}
          SQLITE_DB_PATH: ${{ vars.SQLITE_DB_PATH }}
        run: |
          set -euo pipefail

          required=(
            AWS_ROLE_ARN
            ECS_EXECUTION_ROLE_ARN
            ECS_TASK_ROLE_ARN
            DJANGO_SECRET_KEY_ARN
            DJANGO_SUPERUSER_PASSWORD_ARN
            ECR_REPOSITORY
            ECS_CLUSTER
            ECS_SERVICE
            ECS_TASK_FAMILY
            BACKEND_CLOUDFRONT_DOMAIN
            ALLOWED_HOSTS
            CORS_ALLOWED_ORIGINS
            CSRF_TRUSTED_ORIGINS
            ADMIN_URL_PATH
            DJANGO_SUPERUSER_USERNAME
            DJANGO_SUPERUSER_EMAIL
            EFS_FILE_SYSTEM_ID
            EFS_ACCESS_POINT_ID
            SQLITE_DB_PATH
          )

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub secret or variable: ${name}"
              exit 1
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render ECS task definition
        env:
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
          TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
          EXECUTION_ROLE_ARN: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}
          TASK_ROLE_ARN: ${{ secrets.ECS_TASK_ROLE_ARN }}
          LOG_GROUP: ${{ env.CLOUDWATCH_LOG_GROUP }}
          BACKEND_ORIGIN: https://${{ vars.BACKEND_CLOUDFRONT_DOMAIN }}
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          CSRF_TRUSTED_ORIGINS: ${{ vars.CSRF_TRUSTED_ORIGINS }}
          ADMIN_URL_PATH: ${{ vars.ADMIN_URL_PATH }}
          SECRET_KEY_ARN: ${{ secrets.DJANGO_SECRET_KEY_ARN }}
          DJANGO_SUPERUSER_USERNAME: ${{ vars.DJANGO_SUPERUSER_USERNAME }}
          DJANGO_SUPERUSER_EMAIL: ${{ vars.DJANGO_SUPERUSER_EMAIL }}
          DJANGO_SUPERUSER_PASSWORD_ARN: ${{ secrets.DJANGO_SUPERUSER_PASSWORD_ARN }}
          DB_ENGINE: sqlite3
          DB_NAME: ${{ vars.SQLITE_DB_PATH }}
          PERSISTENCE_MODE: hybrid
          RUN_DATABASE_MIGRATIONS: "true"
          RUN_INITADMIN: "true"
          EFS_FILE_SYSTEM_ID: ${{ vars.EFS_FILE_SYSTEM_ID }}
          EFS_ACCESS_POINT_ID: ${{ vars.EFS_ACCESS_POINT_ID }}
          DYNAMODB_TABLE_PREFIX: ${{ env.DYNAMODB_TABLE_PREFIX }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          python ops/aws/render_task_definition.py \
            --template ops/aws/ecs-task-definition.json \
            --output ops/aws/ecs-task-definition.rendered.json

      - name: Register ECS task definition
        id: register-task-definition
        run: |
          set -euo pipefail
          task_definition_arn="$(
            aws ecs register-task-definition \
              --cli-input-json file://ops/aws/ecs-task-definition.rendered.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"
          echo "task_definition_arn=${task_definition_arn}" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "${{ steps.register-task-definition.outputs.task_definition_arn }}" \
            --force-new-deployment

      - name: Wait for ECS service stability
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"

      - name: Smoke test backend health endpoint
        run: |
          set -euo pipefail
          for attempt in {1..20}; do
            http_code="$(
              curl --show-error --silent \
                --output /tmp/backend-health.json \
                --write-out '%{http_code}' \
                "https://${{ vars.BACKEND_CLOUDFRONT_DOMAIN }}/health/"
            )"

            if [ "${http_code}" = "200" ] && grep -q '"service"[[:space:]]*:[[:space:]]*"MobileID"' /tmp/backend-health.json; then
              cat /tmp/backend-health.json
              exit 0
            fi

            echo "Backend smoke test attempt ${attempt} returned HTTP ${http_code}"
            cat /tmp/backend-health.json || true

            if [ "${attempt}" -lt 20 ]; then
              sleep 15
            fi
          done

          echo "::error::Backend health endpoint did not return the expected MobileID health payload"
          exit 1

      - name: Smoke test Django admin login page
        run: |
          set -euo pipefail
          admin_url="https://${{ vars.BACKEND_CLOUDFRONT_DOMAIN }}/${{ vars.ADMIN_URL_PATH }}/login/"

          for attempt in {1..20}; do
            http_code="$(
              curl --show-error --silent \
                --output /tmp/admin-login.html \
                --write-out '%{http_code}' \
                "${admin_url}"
            )"

            if [ "${http_code}" = "200" ] \
              && grep -qi "Django administration\|Log in" /tmp/admin-login.html \
              && ! grep -q "Django admin is unavailable" /tmp/admin-login.html; then
              exit 0
            fi

            echo "Admin smoke test attempt ${attempt} returned HTTP ${http_code}"
            cat /tmp/admin-login.html || true

            if [ "${attempt}" -lt 20 ]; then
              sleep 15
            fi
          done

          echo "::error::Django admin login page did not become available"
          exit 1

  frontend-deploy:
    name: Frontend Deploy (Amplify)
    needs:
      - backend-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Amplify configuration
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ vars.AMPLIFY_BRANCH }}
          BACKEND_CLOUDFRONT_DOMAIN: ${{ vars.BACKEND_CLOUDFRONT_DOMAIN }}
          DJANGO_SUPERUSER_USERNAME: ${{ vars.DJANGO_SUPERUSER_USERNAME }}
          DJANGO_SUPERUSER_PASSWORD: ${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            AWS_ROLE_ARN
            AMPLIFY_APP_ID
            AMPLIFY_BRANCH
            BACKEND_CLOUDFRONT_DOMAIN
            DJANGO_SUPERUSER_USERNAME
            DJANGO_SUPERUSER_PASSWORD
          )

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub secret or variable: ${name}"
              exit 1
            fi
          done

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: pages/yarn.lock

      - name: Install frontend dependencies
        working-directory: ./pages
        run: yarn install --frozen-lockfile --network-timeout 120000

      - name: Build frontend bundle
        working-directory: ./pages
        env:
          # Build the SPA against same-origin API paths so Amplify can reverse
          # proxy them as first-party requests and Safari/iOS can keep cookies.
          VITE_API_BASE_URL: /
        run: yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render Amplify custom rules
        env:
          BACKEND_ORIGIN: https://${{ vars.BACKEND_CLOUDFRONT_DOMAIN }}
        run: |
          set -euo pipefail
          python ops/aws/render_amplify_custom_rules.py \
            --template ops/aws/amplify-custom-rules.template.json \
            --output ops/aws/amplify-custom-rules.rendered.json

      - name: Sync Amplify custom rules
        run: |
          set -euo pipefail
          aws amplify update-app \
            --app-id "${{ vars.AMPLIFY_APP_ID }}" \
            --custom-rules file://ops/aws/amplify-custom-rules.rendered.json >/dev/null

      - name: Package frontend artifact
        working-directory: ./pages/dist
        run: |
          set -euo pipefail
          zip -r -q ../../frontend-dist.zip .

      - name: Create Amplify deployment
        id: create-amplify-deployment
        run: |
          set -euo pipefail
          aws amplify create-deployment \
            --app-id "${{ vars.AMPLIFY_APP_ID }}" \
            --branch-name "${{ vars.AMPLIFY_BRANCH }}" \
            > amplify-deployment.json

          upload_url="$(jq -r '.zipUploadUrl' amplify-deployment.json)"
          job_id="$(jq -r '.jobId' amplify-deployment.json)"

          if [ -z "${upload_url}" ] || [ "${upload_url}" = "null" ]; then
            echo "::error::Amplify create-deployment did not return a zipUploadUrl"
            exit 1
          fi

          if [ -z "${job_id}" ] || [ "${job_id}" = "null" ]; then
            echo "::error::Amplify create-deployment did not return a jobId"
            exit 1
          fi

          echo "upload_url=${upload_url}" >> "$GITHUB_OUTPUT"
          echo "job_id=${job_id}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact to Amplify
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            -T frontend-dist.zip \
            "${{ steps.create-amplify-deployment.outputs.upload_url }}"

      - name: Start Amplify deployment
        run: |
          set -euo pipefail
          aws amplify start-deployment \
            --app-id "${{ vars.AMPLIFY_APP_ID }}" \
            --branch-name "${{ vars.AMPLIFY_BRANCH }}" \
            --job-id "${{ steps.create-amplify-deployment.outputs.job_id }}"

      - name: Wait for Amplify deployment
        run: |
          set -euo pipefail

          for attempt in {1..60}; do
            status="$(
              aws amplify get-job \
                --app-id "${{ vars.AMPLIFY_APP_ID }}" \
                --branch-name "${{ vars.AMPLIFY_BRANCH }}" \
                --job-id "${{ steps.create-amplify-deployment.outputs.job_id }}" \
                --query 'job.summary.status' \
                --output text
            )"

            echo "Amplify job status: ${status}"

            case "${status}" in
              SUCCEED|SUCCEEDED)
                exit 0
                ;;
              FAILED|CANCELLED)
                echo "::error::Amplify deployment finished with status ${status}"
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "::error::Timed out waiting for Amplify deployment"
          exit 1

      - name: Smoke test frontend home page
        run: |
          set -euo pipefail
          frontend_origin="https://${{ vars.AMPLIFY_BRANCH }}.${{ vars.AMPLIFY_APP_ID }}.amplifyapp.com"

          http_code="$(
            curl --show-error --silent \
              --output /tmp/frontend-home.html \
              --write-out '%{http_code}' \
              "${frontend_origin}/"
          )"

          if [ "${http_code}" != "200" ]; then
            echo "::error::Frontend home page returned HTTP ${http_code}"
            cat /tmp/frontend-home.html || true
            exit 1
          fi

      - name: Smoke test same-origin auth session
        env:
          DJANGO_SUPERUSER_USERNAME: ${{ vars.DJANGO_SUPERUSER_USERNAME }}
          DJANGO_SUPERUSER_PASSWORD: ${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
        run: |
          set -euo pipefail
          frontend_origin="https://${{ vars.AMPLIFY_BRANCH }}.${{ vars.AMPLIFY_APP_ID }}.amplifyapp.com"

          for attempt in $(seq 1 12); do
            rm -f /tmp/frontend-auth.cookies

            csrf_code="$(
              curl --show-error --silent \
                --cookie-jar /tmp/frontend-auth.cookies \
                --output /tmp/frontend-csrf.json \
                --write-out '%{http_code}' \
                "${frontend_origin}/authn/csrf/"
            )"

            csrf_cookie="$(awk '/csrftoken/ {print $7}' /tmp/frontend-auth.cookies | tail -1)"

            login_code="$(
              jq -nc \
                --arg username "${DJANGO_SUPERUSER_USERNAME}" \
                --arg password "${DJANGO_SUPERUSER_PASSWORD}" \
                '{username: $username, password: $password}' \
              | curl --show-error --silent \
                  --cookie /tmp/frontend-auth.cookies \
                  --cookie-jar /tmp/frontend-auth.cookies \
                  --header 'Content-Type: application/json' \
                  --header "X-CSRFToken: ${csrf_cookie}" \
                  --data @- \
                  --output /tmp/frontend-login.json \
                  --write-out '%{http_code}' \
                  "${frontend_origin}/authn/login/"
            )"

            user_code="$(
              curl --show-error --silent \
                --cookie /tmp/frontend-auth.cookies \
                --output /tmp/frontend-user.json \
                --write-out '%{http_code}' \
                "${frontend_origin}/authn/user_info/"
            )"

            if [ "${csrf_code}" = "200" ] \
              && [ -n "${csrf_cookie}" ] \
              && [ "${login_code}" = "200" ] \
              && grep -q '"Login successful"' /tmp/frontend-login.json \
              && [ "${user_code}" = "200" ] \
              && jq -e \
                --arg username "${DJANGO_SUPERUSER_USERNAME}" \
                '.username == $username' \
                /tmp/frontend-user.json >/dev/null; then
              exit 0
            fi

            echo "Auth smoke test attempt ${attempt}/12 not ready yet"
            echo "CSRF HTTP ${csrf_code}, login HTTP ${login_code}, user_info HTTP ${user_code}"
            cat /tmp/frontend-csrf.json || true
            cat /tmp/frontend-login.json || true
            cat /tmp/frontend-user.json || true

            if [ "${attempt}" -lt 12 ]; then
              sleep 15
            fi
          done

          echo "::error::Frontend same-origin auth smoke test did not stabilize after deployment"
          exit 1
