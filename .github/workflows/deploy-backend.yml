name: Deploy Backend to Vercel

on:
  push:
    branches: [main]
    paths: ['src/**', 'api/**', 'vercel.json', 'build_files.sh', 'requirements.txt']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: ./src
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: ./src
        env:
          TESTING: 'True'
          DJANGO_SETTINGS_MODULE: core.settings.dev
        run: python manage.py test

  migrate:
    name: Run Migrations
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: ./src
        run: pip install -r requirements.txt
      - name: Run migrations
        working-directory: ./src
        env:
          DJANGO_SETTINGS_MODULE: core.settings.dev
          DATABASE_URL_LOCAL: ${{ secrets.SUPERBASE_DATABASE_URL }}
          DB_PROFILE: local
          DB_SSL_MODE: require
        run: |
          python manage.py migrate --noinput
          python manage.py createcachetable || true
      - name: Create/update superuser
        working-directory: ./src
        env:
          DJANGO_SETTINGS_MODULE: core.settings.dev
          DATABASE_URL_LOCAL: ${{ secrets.SUPERBASE_DATABASE_URL }}
          DB_PROFILE: local
          DB_SSL_MODE: require
          DJANGO_SUPERUSER_USERNAME: ${{ secrets.DJANGO_SUPERUSER_USERNAME }}
          DJANGO_SUPERUSER_PASSWORD: ${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
          DJANGO_SUPERUSER_EMAIL: ${{ secrets.DJANGO_SUPERUSER_EMAIL }}
        run: python manage.py initadmin || true

  deploy:
    name: Deploy to Vercel
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel project
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token=$VERCEL_TOKEN
