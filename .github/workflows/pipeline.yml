name: Pipeline

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pages/**"
      - ".github/workflows/pipeline.yml"
  pull_request:
    paths:
      - "src/**"
      - "pages/**"
      - ".github/workflows/pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  YARN_NETWORK_TIMEOUT: 120000
  # Opt-in to Node.js 24 for JS-based actions; silences the Node.js 20
  # deprecation warnings until actions/* publish Node-24 major releases.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Pipeline stages:
#   1. Lint        — fast gate, catches style issues
#   2. Test        — unit / integration / e2e (needs lint)
#   3. Build       — Docker image + frontend dist (needs test)
#   4. Security    — dependency & image scans (needs build)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

jobs:
  # ── Stage 1: Lint ───────────────────────────────────────

  backend-lint:
    name: "1 · Backend Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install linters
        working-directory: ./src
        run: pip install -r requirements-dev.txt
      - name: Black
        working-directory: ./src
        run: black --check .
      - name: Flake8
        working-directory: ./src
        run: flake8 .
      - name: Ruff
        working-directory: ./src
        run: ruff check .

  frontend-lint:
    name: "1 · Frontend Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: pages/yarn.lock
      - name: Install dependencies
        working-directory: ./pages
        run: yarn install --frozen-lockfile --network-timeout 120000
      - name: Prettier
        working-directory: ./pages
        run: yarn prettier --check .
      - name: ESLint
        working-directory: ./pages
        run: yarn lint

  # ── Stage 2: Test ───────────────────────────────────────

  migration-file-guard:
    name: "2 · Migration File Guard"
    needs: [backend-lint]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check for modified migration files
        run: |
          CHANGED=$(git diff --diff-filter=M --name-only origin/${{ github.base_ref }}...HEAD -- \
            'src/*/migrations/*.py' 'src/*/*/migrations/*.py' | grep -v '__init__.py' || true)
          if [ -n "$CHANGED" ]; then
            echo "::error::Migration files changed: $CHANGED"
            exit 1
          fi

  migration-check:
    name: "2 · Migration Check"
    needs: [backend-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ./src
        run: pip install -r requirements.txt
      - name: Check for missing migrations
        working-directory: ./src
        env:
          DJANGO_SETTINGS_MODULE: "core.settings.dev"
          TESTING: "True"
        run: python manage.py makemigrations --check --dry-run
      - name: Test migrations application
        working-directory: ./src
        env:
          DJANGO_SETTINGS_MODULE: "core.settings.dev"
          TESTING: "True"
        run: python manage.py migrate

  django-test:
    name: "2 · Django Test"
    needs: [backend-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ./src
        run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        working-directory: ./src
        env:
          TESTING: "True"
          DJANGO_SETTINGS_MODULE: "core.settings.dev"
        run: |
          coverage run manage.py test -v 2
          coverage report --fail-under=70
          coverage xml -o coverage.xml
      - name: Upload coverage
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: src/coverage.xml
          retention-days: 30

  npm-test:
    name: "2 · Frontend Test"
    needs: [frontend-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: pages/yarn.lock
      - name: Install dependencies
        working-directory: ./pages
        run: yarn install --frozen-lockfile --network-timeout 120000
      - name: Unit tests
        working-directory: ./pages
        run: yarn test:unit
      - name: Get Playwright version
        id: playwright-version
        working-directory: ./pages
        run: echo "version=$(npx playwright --version)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./pages
        run: npx playwright install --with-deps
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: ./pages
        run: npx playwright install-deps
      - name: E2E tests
        working-directory: ./pages
        env:
          CI: "true"
        run: yarn test:e2e:ci
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: pages/playwright-report
          if-no-files-found: ignore

  # ── Stage 3: Build ─────────────────────────────────────

  docker-build:
    name: "3 · Docker Build"
    needs: [django-test, migration-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: false
          load: true
          tags: mobileid-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-build:
    name: "3 · Frontend Build"
    needs: [npm-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: pages/yarn.lock
      - name: Install dependencies
        working-directory: ./pages
        run: yarn install --frozen-lockfile --network-timeout 120000
      - name: Build
        working-directory: ./pages
        env:
          VITE_API_BASE_URL: https://api.example.com
        run: yarn build

  # ── Stage 4: Security ──────────────────────────────────

  python-security:
    name: "4 · Python Security"
    needs: [django-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Safety
        run: pip install safety
      - name: Run Safety check
        working-directory: ./src
        run: |
          safety scan --target requirements.txt --output json 2>/dev/null > safety-report.json || \
            safety check -r requirements.txt --output json 2>/dev/null > safety-report.json || true
          safety scan --target requirements.txt 2>/dev/null || \
            safety check -r requirements.txt || true
      - name: Enforce Safety baseline
        working-directory: ./src
        run: |
          python - <<'PY'
          import json, pathlib, sys

          report = pathlib.Path("safety-report.json")
          if not report.exists():
              print("::error::Safety report missing"); sys.exit(1)

          content = report.read_text().strip()
          if not content:
              print("Safety: report is empty, assuming no vulnerabilities"); sys.exit(0)

          data = None
          for line in content.split('\n'):
              line = line.strip()
              if line.startswith('{') or line.startswith('['):
                  try: data = json.loads(line); break
                  except json.JSONDecodeError: continue

          if data is None:
              try: data = json.loads(content)
              except json.JSONDecodeError:
                  print("::warning::Could not parse Safety JSON output"); sys.exit(0)

          vulns = []
          if isinstance(data, dict):
              vulns = data.get("vulnerabilities") or data.get("issues") or data.get("results", {}).get("vulnerabilities") or []
          elif isinstance(data, list):
              vulns = data

          if len(vulns) > 0:
              print(f"::error::Safety found {len(vulns)} vulnerabilities"); sys.exit(1)
          print("Safety: no vulnerabilities found")
          PY
      - name: Upload Safety report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: python-security-report
          path: src/safety-report.json
          retention-days: 30

  nodejs-security:
    name: "4 · Node.js Security"
    needs: [npm-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: pages/yarn.lock
      - name: Install dependencies
        working-directory: ./pages
        run: yarn install --frozen-lockfile --network-timeout 120000
      - name: Run Yarn Audit
        working-directory: ./pages
        run: |
          yarn audit --json > yarn-audit-report.json 2>&1 || true
          yarn audit --summary || true
      - name: Enforce Yarn Audit baseline
        working-directory: ./pages
        run: |
          node - <<'NODE'
          const fs = require('fs');
          if (!fs.existsSync('yarn-audit-report.json')) {
            console.error('::error::Yarn audit report missing'); process.exit(1);
          }
          const content = fs.readFileSync('yarn-audit-report.json', 'utf8').trim();
          if (!content) { console.error('::error::Yarn audit report is empty'); process.exit(1); }

          let summary;
          for (const line of content.split('\n')) {
            try { const obj = JSON.parse(line); if (obj.type === 'auditSummary') summary = obj.data; } catch {}
          }
          if (!summary || !summary.vulnerabilities) {
            console.error('::error::Yarn audit summary missing'); process.exit(1);
          }
          const { high = 0, critical = 0 } = summary.vulnerabilities;
          if (high > 0 || critical > 0) {
            console.error(`::error::Yarn audit found high=${high} critical=${critical}`); process.exit(1);
          }
          console.log('Yarn audit: no high/critical vulnerabilities');
          NODE
      - name: Upload Yarn Audit report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: nodejs-security-report
          path: pages/yarn-audit-report.json
          retention-days: 30

  docker-security:
    name: "4 · Docker Security (Trivy)"
    needs: [docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: false
          load: true
          tags: mobileid-backend:scan
          cache-from: type=gha
      - name: Trivy scan (table)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "mobileid-backend:scan"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM"
          trivyignores: src/.trivyignore
      - name: Trivy scan (JSON report)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "mobileid-backend:scan"
          format: "json"
          output: "trivy-report.json"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM"
          trivyignores: src/.trivyignore
      - name: Upload Trivy report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: docker-security-report
          path: trivy-report.json
          retention-days: 30
      - name: Fail on high/critical
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "mobileid-backend:scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          trivyignores: src/.trivyignore

  # ── Summary Gate ────────────────────────────────────────

  pipeline-passed:
    name: Pipeline Passed
    if: always()
    needs:
      - docker-build
      - frontend-build
      - python-security
      - nodejs-security
      - docker-security
      - migration-file-guard
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check results
        env:
          DOCKER_BUILD: ${{ needs.docker-build.result }}
          FRONTEND_BUILD: ${{ needs.frontend-build.result }}
          PYTHON_SECURITY: ${{ needs.python-security.result }}
          NODEJS_SECURITY: ${{ needs.nodejs-security.result }}
          DOCKER_SECURITY: ${{ needs.docker-security.result }}
          MIGRATION_FILE_GUARD: ${{ needs.migration-file-guard.result }}
        run: |
          fail=0
          for name in DOCKER_BUILD FRONTEND_BUILD PYTHON_SECURITY NODEJS_SECURITY DOCKER_SECURITY; do
            val="${!name}"
            if [ "$val" != "success" ]; then
              echo "::error::$name = $val"
              fail=1
            fi
          done
          # migration-file-guard runs only on pull_request; "skipped" on push/workflow_dispatch is expected.
          if [ "$MIGRATION_FILE_GUARD" != "success" ] && [ "$MIGRATION_FILE_GUARD" != "skipped" ]; then
            echo "::error::MIGRATION_FILE_GUARD = $MIGRATION_FILE_GUARD"
            fail=1
          fi
          if [ "$fail" -eq 0 ]; then
            echo "All required jobs passed"
          fi
          exit $fail
